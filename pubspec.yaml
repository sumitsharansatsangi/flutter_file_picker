name: file_picker
description: A package that allows you to use a native file explorer to pick single or multiple absolute file paths, with extension filtering support.
homepage: https://github.com/miguelpruivo/plugins_flutter_file_picker
repository: https://github.com/miguelpruivo/flutter_file_picker
issue_tracker: https://github.com/miguelpruivo/flutter_file_picker/issues
publish_to: none
version: 12.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  flutter_plugin_android_lifecycle:
    git: https://github.com/kumsumit/flutter_plugin_android_lifecycle.git
  plugin_platform_interface:
    git: https://github.com/kumsumit/plugin_platform_interface.git
  ffi: ^2.2.0
  path: ^1.9.1
  win32: ^6.2.0
  cross_file: ^0.3.5+2
  web: ^1.1.1
  dbus:
    git: "https://github.com/kumsumit/dbus.dart.git"

dev_dependencies:
  lints: ^6.1.0
  flutter_test:
    sdk: flutter

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

formatter:
  page_width: 80

flutter:
  plugin:
    platforms:
      android:
        package: com.mr.flutter.plugin.filepicker
        pluginClass: FilePickerPlugin
      ios:
        pluginClass: FilePickerPlugin
        sharedDarwinSource: true
      web:
        pluginClass: FilePickerWeb
        fileName: src/platform/web/file_picker_web.dart
      macos:
        pluginClass: FilePickerPlugin
        sharedDarwinSource: true
        dartPluginClass: FilePickerMacOS
      windows:
        dartPluginClass: FilePickerWindows
      linux:
        dartPluginClass: FilePickerLinux
